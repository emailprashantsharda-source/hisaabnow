<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KrodAI</title>

<!-- FIREBASE SAFE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#EADBC8;}
.container{padding:16px;padding-bottom:100px;}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:14px;}
.hero{background:linear-gradient(135deg,#FF4D00,#FF7A00);color:white;text-align:center;}
.btn{background:#FF4D00;color:white;border:none;padding:14px;border-radius:12px;margin:6px;font-size:16px;}
.voice{position:fixed;bottom:80px;right:20px;width:70px;height:70px;border-radius:50%;background:#FF4D00;color:white;font-size:24px;box-shadow:0 10px 25px rgba(0,0,0,0.2);}
</style>
</head>

<body>

<div class="container">

<div class="card hero">
<h1 id="profit">₹0</h1>
<div>Aaj ka Profit 🔥</div>
<div id="meta">Sales ₹0 | Kharcha ₹0</div>
</div>

<div class="card">
<button class="btn" onclick="addSale()">+ Sale</button>
<button class="btn" onclick="addUdhar()">+ Udhar</button>
<button class="btn" onclick="addExpense()">+ Kharcha</button>
<button class="btn" onclick="startVoice()">🎤 Bolke Likho</button>
</div>

<div class="card">
<h3>📦 Stock Alerts</h3>
<div id="inventory">Loading...</div>
</div>

<div class="card">
<h3>💰 Udhar</h3>
<div id="udhar">Loading...</div>
</div>

<div class="card">
<h3>🧠 Smart Salah</h3>
<div id="insights">Loading...</div>
</div>

<button class="btn" onclick="share()">Share</button>
<button class="btn" onclick="shareWA()">WhatsApp</button>

</div>

<button class="voice" onclick="startVoice()">🎤</button>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB8v9gYxCg4qBfLl2J08D9TeUVygKVAqC8",
  authDomain: "panshopmanager.firebaseapp.com",
  projectId: "panshopmanager",
  storageBucket: "panshopmanager.firebasestorage.app",
  messagingSenderId: "448042777087",
  appId: "1:448042777087:web:9b4c4a0bd4dbc425bccfca",
  measurementId: "G-YVLCREDL6Q"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let entries=[];
let inventory={chai:10};
let customers={};

// LOAD DATA
async function load(){

  try{
    const snap = await db.collection("entries_v2").get();

    entries = [];

    snap.forEach(d=>{
      entries.push(d.data());
    });

    updateUI();

  }catch(e){
    console.error(e);
    alert("Load error: " + e.message);
  }
}

// UI UPDATE
function updateUI(){

  let sales=0,expense=0;

  entries.forEach(e=>{
    if(e.type==="sale") sales+=e.amount;
    if(e.type==="expense") expense+=e.amount;
  });

  document.getElementById("profit").innerText="₹"+(sales-expense);
  document.getElementById("meta").innerText=`Sales ₹${sales} | Kharcha ₹${expense}`;

  document.getElementById("inventory").innerHTML =
    inventory.chai<5 ? "⚠️ chai low" : "OK";

  document.getElementById("udhar").innerHTML =
    Object.keys(customers).length
    ? Object.keys(customers).map(c=>`${c}: ₹${customers[c]}`).join("<br>")
    : "No udhar";

  document.getElementById("insights").innerHTML =
    sales<200 ? "💡 Push sales" : "🔥 Good going";
}

// ACTIONS
async function addSale(){

  try{
    await db.collection("entries_v2").add({
      type:"sale",
      amount:50,
      createdAt:new Date()
    });

    inventory.chai--;

    await load();

  }catch(e){
    alert("Error: "+e.message);
  }
}

async function addExpense(){

  try{
    await db.collection("entries_v2").add({
      type:"expense",
      amount:20,
      createdAt:new Date()
    });

    await load();

  }catch(e){
    alert("Error: "+e.message);
  }
}

function addUdhar(){
  customers["Ramesh"]=(customers["Ramesh"]||0)+50;
  alert("Udhar added ₹50");
  updateUI();
}

// SHARE
function share(){
  const text="🔥 Aaj profit check karo!";
  if(navigator.share) navigator.share({text});
  else alert(text);
}

function shareWA(){
  window.open("https://wa.me/?text=Aaj profit check karo");
}

// VOICE
function startVoice(){

  if(!('webkitSpeechRecognition' in window)){
    alert("Voice not supported");
    return;
  }

  const r=new webkitSpeechRecognition();
  r.lang="hi-IN";
  r.start();

  r.onresult=async(e)=>{
    try{
      await db.collection("entries_v2").add({
        type:"sale",
        amount:50,
        createdAt:new Date()
      });

      await load();

    }catch(err){
      alert("Voice error");
    }
  };
}

// INIT (IMPORTANT FIX)
setTimeout(load, 500);

</script>

</body>
</html>
