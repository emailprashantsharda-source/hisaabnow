<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KrodAI</title>

<style>
body{margin:0;font-family:sans-serif;background:#F7F7F7;}
.container{padding:16px;padding-bottom:100px;}
.card{background:white;border-radius:16px;padding:16px;margin-bottom:14px;}
.hero{background:linear-gradient(135deg,#FF4D00,#FF7A00);color:white;text-align:center;}
.hero .profit{font-size:34px;font-weight:700;}
.btn{background:#FF4D00;color:white;border:none;padding:10px;border-radius:10px;margin-top:10px;}
.voice{position:fixed;bottom:80px;right:20px;width:60px;height:60px;border-radius:50%;background:#FF4D00;color:white;}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);
background:black;color:white;padding:10px;border-radius:20px;display:none;}
.progress{height:10px;background:#eee;border-radius:10px;}
.progress-bar{height:10px;background:#FF4D00;border-radius:10px;width:0%;}
#onboarding{position:fixed;top:0;left:0;width:100%;height:100%;background:white;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
</style>
</head>

<body>

<div id="toast"></div>

<!-- ONBOARDING -->
<div id="onboarding">
<h2>🎤 Bolke entry karo</h2>
<p>Try: “2 chai bechi”</p>

<div style="background:#FFF3E0;padding:10px;border-radius:10px;margin:10px;">
🔥 Demo: Aaj ₹240 kama liya
</div>

<p>Select your shop:</p>
<button class="btn" onclick="selectCategory('tea')">Tea</button>
<button class="btn" onclick="selectCategory('pan')">Pan</button>
<button class="btn" onclick="selectCategory('juice')">Juice</button>
</div>

<div class="container" id="app" style="display:none;">

<div class="card hero">
<div>Profit</div>
<div id="profit">₹0</div>
</div>

<div class="card">
🎯 <div id="goalText"></div>
<div class="progress"><div id="goalBar" class="progress-bar"></div></div>
</div>

<div class="card">
🧠 <div id="insights"></div>
<div id="actions"></div>
</div>

<div class="card">
🧾 <div id="lastEntry"></div>
</div>

<div class="card">
📦 <div id="inventory"></div>
</div>

<div class="card">
💰 <div id="udhar"></div>
</div>

<button class="btn" onclick="share()">Share</button>
<button class="btn" onclick="shareWhatsApp()">WhatsApp</button>

</div>

<button class="voice" onclick="startVoice()">🎤</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  projectId: "PASTE",
  storageBucket: "PASTE",
  messagingSenderId: "PASTE",
  appId: "PASTE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let entries=[];
let inventory={};
let customers={};
let products=[];
let lastProduct=null;

const packs={
tea:[{n:"chai",p:10,s:50},{n:"coffee",p:20,s:30}],
pan:[{n:"gold flake",p:20,s:30},{n:"rajnigandha",p:10,s:40}],
juice:[{n:"orange juice",p:30,s:20},{n:"apple juice",p:40,s:20}]
};

function showToast(t){
const el=document.getElementById("toast");
el.innerText=t;el.style.display="block";
setTimeout(()=>el.style.display="none",2000);
}

// CATEGORY
window.selectCategory=function(c){
products=packs[c];
products.forEach(p=>inventory[p.n]=p.s);
document.getElementById("onboarding").style.display="none";
document.getElementById("app").style.display="block";
loadEntries();
};

// SAVE ENTRY
async function saveEntry(e){

await addDoc(collection(db,"entries_v2"),{
...e,
createdAt:new Date()
});

if(e.productName){
inventory[e.productName]=Math.max((inventory[e.productName]||0)-(e.quantity||1),0);
await setDoc(doc(db,"inventory","main"),inventory);
}

if(e.type==="udhar"){
customers[e.customerName]=(customers[e.customerName]||0)+e.amount;
await setDoc(doc(db,"customers","main"),customers);
}

showToast(`Saved ₹${e.amount||0} at ${new Date().toLocaleTimeString()}`);

loadEntries();
}

// LOAD
async function loadEntries(){

// entries
const snap=await getDocs(collection(db,"entries_v2"));
entries=[];
snap.forEach(doc=>entries.push(doc.data()));

// inventory
try{
const invSnap=await getDocs(collection(db,"inventory"));
invSnap.forEach(d=>inventory=d.data());
}catch{}

// customers
try{
const custSnap=await getDocs(collection(db,"customers"));
custSnap.forEach(d=>customers=d.data());
}catch{}

updateUI();
loadInsights();
}

// UI
function updateUI(){

let total=0;

entries.forEach(e=>{
if(e.type==="sale") total+=e.amount;
if(e.type==="expense") total-=e.amount;
});

document.getElementById("profit").innerText="₹"+total;

// GOAL
const goal=500;
const percent=Math.min((total/goal)*100,100);

document.getElementById("goalText").innerText=`₹${total} / ₹${goal}`;
document.getElementById("goalBar").style.width=percent+"%";

if(total>=goal) showToast("🎉 Goal complete");

// LAST ENTRY
const last=entries[entries.length-1];
if(last){
const t=new Date(last.createdAt?.seconds*1000||Date.now());
document.getElementById("lastEntry").innerText=
`${last.type} ₹${last.amount} • ${t.toLocaleTimeString()}`;
}

// INVENTORY
let invHTML="";
Object.keys(inventory).forEach(k=>{
if(inventory[k]<5) invHTML+=`⚠️ ${k} low<br>`;
});
document.getElementById("inventory").innerHTML=invHTML;

// UDHAR
let uHTML="";
Object.keys(customers).forEach(c=>{
if(customers[c]>200) uHTML+=`⚠️ ${c} owes ₹${customers[c]}<br>`;
});
document.getElementById("udhar").innerHTML=uHTML;

}

// AI INSIGHTS
async function loadInsights(){

let totalSales=0,totalProfit=0;
let items={};

entries.forEach(e=>{
if(e.type==="sale"){ totalSales+=e.amount; totalProfit+=e.amount;}
if(e.type==="expense"){ totalProfit-=e.amount;}
if(e.productName){
items[e.productName]=(items[e.productName]||0)+1;
}
});

const topItems=Object.keys(items).sort((a,b)=>items[b]-items[a]).slice(0,1);

try{
const res=await fetch("https://getaiinsight-wzwuduebea-uc.a.run.app",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
totalSales,totalProfit,billCount:entries.length,topItems
})
});

const json=await res.json();

document.getElementById("insights").innerText=json.insight||"";

let actionHTML="";

// top product
if(topItems.length){
actionHTML+=`<button class="btn" onclick="quickSell('${topItems[0]}')">🔥 Sell more ${topItems[0]}</button>`;
}

// low profit
if(totalProfit<100){
actionHTML+=`<button class="btn" style="background:#333">⚠️ Reduce expense</button>`;
}

// low sales
if(totalSales<200){
actionHTML+=`<button class="btn">💡 Push sales</button>`;
}

// udhar risk
if(Object.values(customers).some(v=>v>200)){
actionHTML+=`<button class="btn" style="background:#222">📞 Collect udhar</button>`;
}

document.getElementById("actions").innerHTML=actionHTML;

}catch{
document.getElementById("insights").innerText="AI unavailable ❌";
}
}

// QUICK SELL
window.quickSell=function(name){
const p=products.find(x=>x.n===name);
if(p){
saveEntry({type:"sale",amount:p.p,productName:name,quantity:1});
}
};

// SHARE
function share(){
let total=0;
entries.forEach(e=>{if(e.type==="sale") total+=e.amount;});
const text=`🔥 Aaj ₹${total} kamaya`;

if(navigator.share) navigator.share({text});
else{
navigator.clipboard.writeText(text);
showToast("Copied for sharing 🔥");
}
}

function shareWhatsApp(){
let total=0;
entries.forEach(e=>{if(e.type==="sale") total+=e.amount;});
window.open(`https://wa.me/?text=Aaj ₹${total} kamaya`);
}

// VOICE
window.startVoice=function(){

if(!('webkitSpeechRecognition' in window)){
showToast("Voice not supported ❌");
return;
}

const r=new webkitSpeechRecognition();
r.lang="hi-IN";
r.start();

r.onresult=async(e)=>{
const text=e.results[0][0].transcript;

const res=await fetch("https://getaiinsight-wzwuduebea-uc.a.run.app",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:text})
});

const json=await res.json();
let data={};

try{
data=JSON.parse(json.response);
}catch{
data={
type:"sale",
amount:50,
productName:lastProduct||"chai",
quantity:1
};
showToast("Default entry added ⚠️");
}

if(data.productName) lastProduct=data.productName;

saveEntry(data);
};
};

</script>
</body>
</html>
